# If Gradle sync fails with "this and base files have different roots" on Windows,
# put Pub cache on the same drive as the project (see GRADLE_WINDOWS.txt).
# Keep heap/metaspace modest so the JVM can start when RAM or the Windows page file is limited.
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
kotlin.daemon.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m
android.useAndroidX=true
android.enableJetifier=true
